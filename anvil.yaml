name: baserow_anvil
package_name: baserow_anvil
renamed: true
runtime_options:
  client_version: '3'
  server_spec: {base: python310-minimal}
  server_version: python3-sandbox
  version: 2
services:
- client_config: {enable_v2: false}
  server_config: {auto_create_missing_columns: true}
