components:
- components:
  - layout_properties: {grid_position: 'KVTBCN,WUBYFD'}
    name: label_1
    properties: {text: Register Machine}
    type: Label
  - layout_properties: {grid_position: 'BYAHNZ,CAFYVY'}
    name: label_serial
    properties: {text: Machine Serial Number}
    type: Label
  - layout_properties: {grid_position: 'BYAHNZ,VVBLTZ'}
    name: text_box_1
    properties: {background: 'theme:Light Overlay 1'}
    type: TextBox
  - layout_properties: {grid_position: 'TBWTPK,CUXJOH'}
    name: label_type
    properties: {text: Machine Type}
    type: Label
  - data_bindings: []
    event_bindings: {change: dropdown_machine_type_change, show: dropdown_machine_type_show}
    layout_properties: {full_width_row: false, grid_position: 'TBWTPK,BKHACR'}
    name: dropdown_machine_type
    properties: {enabled: true, include_placeholder: false, placeholder: Select Machine Model}
    type: DropDown
  - layout_properties: {grid_position: 'NTRGRB,PXUBCX'}
    name: label_store
    properties: {text: Store Name}
    type: Label
  - event_bindings: {show: drop_down_store_show}
    layout_properties: {grid_position: 'NTRGRB,WVCINO'}
    name: drop_down_store
    properties: {}
    type: DropDown
  layout_properties: {slot: default}
  name: content_panel
  properties: {background: '#ffffff', col_widths: '{}'}
  type: ColumnPanel
- layout_properties: {slot: nav-right}
  name: navbar_links
  properties: {background: 'theme:Surface'}
  type: FlowPanel
container:
  properties: {background: '#ffffff', foreground: '', html: '@theme:standard-page.html', visible: true}
  type: HtmlTemplate
is_package: true
