components:
- components:
  - data_bindings:
    - {code: '', property: font, writeback: false}
    layout_properties: {grid_position: 'KVTBCN,WUBYFD'}
    name: label_1
    properties: {align: center, bold: false, font_size: 20, spacing_above: large, spacing_below: large, text: Register Machine, underline: false}
    type: Label
  - layout_properties: {grid_position: 'BYAHNZ,CAFYVY'}
    name: label_serial
    properties: {text: Machine Serial Number}
    type: Label
  - layout_properties: {grid_position: 'BYAHNZ,VVBLTZ'}
    name: input_serial
    properties: {background: 'theme:Light Overlay 1'}
    type: TextBox
  - layout_properties: {grid_position: 'TBWTPK,CUXJOH'}
    name: label_type
    properties: {text: Machine Type}
    type: Label
  - data_bindings: []
    event_bindings: {change: dropdown_machine_type_change, show: dropdown_machine_type_show}
    layout_properties: {full_width_row: false, grid_position: 'TBWTPK,BKHACR'}
    name: dropdown_machine_type
    properties: {enabled: true, include_placeholder: false, placeholder: Select Machine Model}
    type: DropDown
  - data_bindings: []
    event_bindings: {click: button_register_machine_click}
    layout_properties: {full_width_row: false, grid_position: 'ASAPPZ,PQNOZP'}
    name: button_register_machine
    properties: {align: center, background: 'theme:On Primary Container', bold: false, foreground: '#ffffff', icon: 'fa:arrow-circle-right', role: filled-button, text: Register Machine}
    type: Button
  layout_properties: {slot: default}
  name: content_panel
  properties: {background: '#ffffff', col_widths: '{}'}
  type: ColumnPanel
- layout_properties: {slot: nav-right}
  name: navbar_links
  properties: {background: 'theme:Surface'}
  type: FlowPanel
- data_bindings: []
  layout_properties: {slot: title}
  name: label_2
  properties: {align: left, background: '', border: '', foreground: '#ffffff', role: null, text: Where Is The Machine, tooltip: '', visible: true}
  type: Label
container:
  properties: {background: '#ffffff', foreground: '', html: '@theme:standard-page.html', visible: true}
  type: HtmlTemplate
is_package: true
