components:
- components:
  - layout_properties: {grid_position: 'MTOBIC,UKEPAA'}
    name: spacer_1
    properties: {height: 32}
    type: Spacer
  - data_bindings: []
    layout_properties: {grid_position: 'BYAHNZ,CAFYVY'}
    name: label_enter_password
    properties: {font_size: 20, text: Enter Login Password}
    type: Label
  - data_bindings: []
    event_bindings: {}
    layout_properties: {full_width_row: false, grid_position: 'BYAHNZ,VVBLTZ'}
    name: input_login_password
    properties: {background: 'theme:Light Overlay 1', hide_text: true}
    type: TextBox
  - layout_properties: {grid_position: 'CJVOBF,LCSGEN'}
    name: label_password_error
    properties: {align: center, background: '#ff0505', font: '', font_size: 20, foreground: '#ffffff'}
    type: Label
  - data_bindings: []
    event_bindings: {click: button_login_click}
    layout_properties: {full_width_row: false, grid_position: 'ASAPPZ,PQNOZP'}
    name: button_login
    properties: {align: center, background: 'theme:On Primary Container', bold: false, font_size: 20, foreground: '#ffffff', icon: 'fa:arrow-circle-right', role: filled-button, spacing_above: large, spacing_below: large, text: Login}
    type: Button
  layout_properties: {slot: default}
  name: content_panel
  properties: {background: '#ffffff', col_widths: '{"CAFYVY":20,"VVBLTZ":40}'}
  type: ColumnPanel
- layout_properties: {slot: nav-right}
  name: navbar_links
  properties: {background: 'theme:Surface'}
  type: FlowPanel
- data_bindings: []
  layout_properties: {slot: title}
  name: label_2
  properties: {align: left, background: '', border: '', font_size: 30, foreground: '#ffffff', role: null, text: Where Is The Machine, tooltip: '', visible: true}
  type: Label
container:
  properties: {background: '#ffffff', foreground: '', html: '@theme:standard-page.html', visible: true}
  type: HtmlTemplate
is_package: true
