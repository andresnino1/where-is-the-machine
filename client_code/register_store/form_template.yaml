- layout_properties: {slot: nav-right}
  name: navbar_links
  properties: {background: 'theme:Surface'}
  type: FlowPanel
- data_bindings: []
  layout_properties: {slot: title}
  name: label_2
  properties: {align: left, background: '', border: '', font_size: 30, foreground: '#ffffff', role: null, text: Where Is The Machine, tooltip: '', visible: true}
  type: Label
container:
  properties: {background: '#ffffff', foreground: '', html: '@theme:standard-page.html', visible: true}
  type: HtmlTemplate
is_package: true
