    event_bindings: {click: button_register_codes_click}
    layout_properties: {full_width_row: false, grid_position: 'ASAPPZ,PQNOZP'}
    name: button_register_codes
    properties: {align: center, background: 'theme:On Primary Container', bold: false, font_size: 20, foreground: '#ffffff', icon: 'fa:arrow-circle-right', role: filled-button, spacing_above: large, spacing_below: large, text: Register New Customer}
