    name: input_serial
    properties: {background: 'theme:Light Overlay 1', placeholder: Search customer Name}
    type: TextBox
  - data_bindings: []
    event_bindings: {change: dropdown_customer_change, show: dropdown_customer_show}
    layout_properties: {grid_position: 'BYAHNZ,VVBLTZ TTZEUX,XKVRQG'}
    name: dropdown_customer
    properties: {enabled: true, include_placeholder: false, placeholder: Select Machine Model}
    type: DropDown
  - layout_properties: {grid_position: 'QVPXQU,JSGKFL DVPNGU,TONHHQ'}
    name: label_customer
    properties: {font_size: 20, text: Store Code}
    type: Label
  - layout_properties: {grid_position: 'QVPXQU,JSGKFL YVEBSS,AOKTJM'}
    name: label_3
    properties: {font_size: 20, text: State}
    type: Label
  - layout_properties: {grid_position: 'QVPXQU,TAQXJI LWFLRT,EWHFPO'}
    name: input_store_code
    properties: {}
    type: TextBox
  - layout_properties: {grid_position: 'QVPXQU,TAQXJI SMQPOC,OXASJM'}
