components:
- components:
  - data_bindings:
    - {code: '', property: font, writeback: false}
    layout_properties: {grid_position: 'KVTBCN,WUBYFD'}
    name: label_1
    properties: {align: center, bold: false, font_size: 30, spacing_above: large, spacing_below: large, text: Register Machine, underline: false}
    type: Label
  - data_bindings: []
    layout_properties: {grid_position: 'BYAHNZ,CAFYVY WIQAJD,PKQLAW'}
    name: label_serial
    properties: {font_size: 20, text: Machine Serial Number}
    type: Label
  - data_bindings: []
    layout_properties: {grid_position: 'BYAHNZ,CAFYVY PKKAIO,YNPSCL'}
    name: label_udi
    properties: {font_size: 20, text: UDI Number}
    type: Label
  - data_bindings: []
    event_bindings: {change: input_serial_change, lost_focus: input_serial_lost_focus, pressed_enter: input_serial_pressed_enter}
    layout_properties: {full_width_row: false, grid_position: 'BYAHNZ,VVBLTZ EPIRVX,WEZDHN'}
    name: input_serial
    properties: {background: 'theme:Light Overlay 1'}
    type: TextBox
  - data_bindings: []
    event_bindings: {}
    layout_properties: {grid_position: 'BYAHNZ,VVBLTZ MABJGB,NOPAKX'}
    name: input_udi
    properties: {background: 'theme:Light Overlay 1'}
    type: TextBox
  - layout_properties: {grid_position: 'TBWTPK,CUXJOH PYNVIU,DRNUQT'}
    name: label_type
    properties: {font_size: 20, text: Machine Type}
    type: Label
  - layout_properties: {grid_position: 'TBWTPK,CUXJOH TIRSRX,ZRQJFY'}
    name: label_store
    properties: {font_size: 20, text: Customer / Store Name}
    type: Label
  - data_bindings: []
    event_bindings: {change: dropdown_machine_type_change, show: dropdown_machine_type_show}
    layout_properties: {full_width_row: false, grid_position: 'TBWTPK,BKHACR NQMYSM,HNLRRP'}
    name: dropdown_machine_type
    properties: {enabled: true, include_placeholder: false, placeholder: Select Machine Model}
    type: DropDown
  - event_bindings: {change: input_store_change}
    layout_properties: {grid_position: 'TBWTPK,BKHACR FGQSFB,NNZLVY'}
    name: input_store
    properties: {placeholder: Search Store's Name}
    type: TextBox
  - event_bindings: {change: dropdown_store_change}
    layout_properties: {grid_position: 'TBWTPK,BKHACR FGQSFB,XJLAWI ADVLDB,WEFAGV'}
    name: dropdown_store
    properties: {}
    type: DropDown
  - event_bindings: {click: button_register_store_click}
    layout_properties: {grid_position: 'TBWTPK,BKHACR FGQSFB,XJLAWI HNNJWU,XBAEFM'}
    name: button_register_store
    properties: {font_size: 15, icon: 'fa:address-book-o', role: outlined-button, text: Register New Store}
    type: Button
  - data_bindings: []
    event_bindings: {click: button_register_machine_click}
    layout_properties: {full_width_row: false, grid_position: 'ASAPPZ,PQNOZP'}
    name: button_register_machine
    properties: {align: center, background: 'theme:On Primary Container', bold: false, font_size: 20, foreground: '#ffffff', icon: 'fa:arrow-circle-right', role: filled-button, spacing_above: large, spacing_below: large, text: Register Machine}
    type: Button
  - data_bindings: []
    layout_properties: {grid_position: 'AFVLEA,LIUMNB'}
    name: label_message
    properties: {align: center, background: '#ffffff', foreground: '#000000'}
    type: Label
  layout_properties: {slot: default}
  name: content_panel
  properties: {background: '#ffffff', col_widths: '{"CAFYVY":20,"VVBLTZ":40,"CUXJOH":20,"BKHACR":40}'}
  type: ColumnPanel
- components:
  - event_bindings: {click: new_store_link_click}
    layout_properties: {}
    name: new_store_link
    properties: {text: New Store}
    type: Link
  layout_properties: {slot: nav-right}
  name: navbar_links
  properties: {background: 'theme:Surface'}
  type: FlowPanel
- event_bindings: {click: home_link_click}
  layout_properties: {slot: title}
  name: home_link
  properties: {font_size: 30, foreground: 'theme:On Secondary', text: Where Is The Machine}
  type: Link
container:
  properties: {background: '#ffffff', foreground: '', html: '@theme:standard-page.html', visible: true}
  type: HtmlTemplate
is_package: true
