components:
- components:
  - data_bindings:
    - {code: '', property: font, writeback: false}
    layout_properties: {grid_position: 'KVTBCN,WUBYFD'}
    name: label_1
    properties: {align: center, bold: false, font_size: 30, spacing_above: large, spacing_below: large, text: Search Machine in Data Base, underline: false}
    type: Label
  - data_bindings: []
    layout_properties: {grid_position: 'BYAHNZ,CAFYVY'}
    name: label_serial
    properties: {font_size: 20, text: Machine Serial Number}
    type: Label
  - event_bindings: {}
    layout_properties: {grid_position: 'BYAHNZ,CAFYVY AITLKL,BEGWHV'}
    name: input_store
    properties: {placeholder: Search Store's Name}
    type: TextBox
  - data_bindings: []
    event_bindings: {}
    layout_properties: {full_width_row: false, grid_position: 'BYAHNZ,VVBLTZ EILZOR,QMXQCZ'}
    name: input_serial
    properties: {background: 'theme:Light Overlay 1'}
    type: TextBox
  - event_bindings: {}
    layout_properties: {grid_position: 'BYAHNZ,VVBLTZ CPVGKQ,DVKQCH'}
    name: drop_down_store
    properties: {}
    type: DropDown
  - layout_properties: {grid_position: 'FOTWDS,XYPYUY'}
    name: spacer_1
    properties: {height: 32}
    type: Spacer
  - components:
    - layout_properties: {grid_position: 'YCZMNB,FFSPSI'}
      name: message_1
      properties: {}
      type: Label
    layout_properties: {grid_position: 'RORSGB,XDMQSG'}
    name: info_card_2
    properties: {background: 'theme:On Primary', role: outlined-card}
    type: ColumnPanel
  - components:
