      properties: {text: Customer Information}
      type: Label
    - components:
      - name: repeating_panel_machines
        properties: {item_template: search_machine.row_template_machines}
        type: RepeatingPanel
      layout_properties: {grid_position: 'YNYTII,MTVJJM'}
      name: data_grid_1
      properties:
        columns:
        - {data_key: serial, id: KKCSMK, title: serial}
        - {data_key: type, id: MEUWNP, title: type}
        - {data_key: current_location, id: YNWNZL, title: current location}
        - {data_key: current_status, id: TFHYWC, title: current status}
      type: DataGrid
    - layout_properties: {grid_position: 'GGGLXB,POJACL'}
      name: spacer_2
      properties: {height: 32}
      type: Spacer
    - layout_properties: {grid_position: 'VPOOFD,KLCIMF'}
      name: label_qa_repairs
      properties: {text: QA and Repairs}
      type: Label
    - components:
      - name: repeating_panel_repairs
        properties: {item_template: search_machine.row_template_repairs}
        type: RepeatingPanel
      layout_properties: {grid_position: 'WFHPMQ,PEWSEU'}
      name: data_grid_2
      properties:
        columns:
        - {data_key: date, id: VWVIVC, title: date}
        - {data_key: issue, id: UBWFRS, title: issue}
        - {data_key: repair_status_link, id: XHMAZY, title: repair_status_link}
      type: DataGrid
    layout_properties: {grid_position: 'LVBRLW,VPSCXQ'}
    name: info_card
    properties: {background: 'theme:On Primary', role: outlined-card}
    type: ColumnPanel
  layout_properties: {slot: default}
  name: content_panel
  properties: {background: '#ffffff', col_widths: '{"CAFYVY":20,"VVBLTZ":40}'}
  type: ColumnPanel
- layout_properties: {slot: nav-right}
  name: navbar_links
  properties: {background: 'theme:Surface'}
  type: FlowPanel
- data_bindings: []
  layout_properties: {slot: title}
  name: label_2
  properties: {align: left, background: '', border: '', font_size: 30, foreground: '#ffffff', role: null, text: Where Is The Machine, tooltip: '', visible: true}
  type: Label
container:
  properties: {background: '#ffffff', foreground: '', html: '@theme:standard-page.html', visible: true}
  type: HtmlTemplate
is_package: true
